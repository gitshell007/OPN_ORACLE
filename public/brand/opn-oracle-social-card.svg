<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="background" x1="72" y1="32" x2="1140" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101D57"/>
      <stop offset="1" stop-color="#07102F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(994 126) rotate(125) scale(470 510)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2844A9" stop-opacity=".72"/>
      <stop offset="1" stop-color="#101D57" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="78" y1="96" x2="655" y2="506" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0D48A"/>
      <stop offset="1" stop-color="#C79A4B"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="25" flood-color="#020718" flood-opacity=".42"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#background)"/>
  <rect width="1200" height="630" rx="36" fill="url(#glow)"/>
  <rect width="1200" height="630" rx="36" fill="url(#grid)"/>

  <g transform="translate(76 66)">
    <circle cx="7" cy="9" r="7" fill="url(#gold)"/>
    <text x="28" y="17" fill="#F0D48A" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="3.2">OPN CONSULTORÍA</text>

    <text x="0" y="140" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="700" letter-spacing="-2.2">OPN Oracle</text>
    <rect x="0" y="170" width="88" height="5" rx="2.5" fill="url(#gold)"/>

    <text x="0" y="242" fill="#F7F4EA" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="600">Inteligencia estratégica</text>
    <text x="0" y="287" fill="#F7F4EA" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="600">trazable</text>

    <text x="0" y="352" fill="#B8C3E2" font-family="Arial, Helvetica, sans-serif" font-size="23">
      Señales, evidencias y relaciones convertidas
    </text>
    <text x="0" y="385" fill="#B8C3E2" font-family="Arial, Helvetica, sans-serif" font-size="23">
      en decisiones y siguientes movimientos.
    </text>

    <g transform="translate(0 452)">
      <rect width="338" height="54" rx="27" fill="#FFFFFF" fill-opacity=".07" stroke="#FFFFFF" stroke-opacity=".13"/>
      <circle cx="28" cy="27" r="6" fill="#D7B968"/>
      <text x="49" y="35" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600">oracle.opnconsultoria.com</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="786" y="72" width="342" height="486" rx="38" fill="#FFFFFF" fill-opacity=".055" stroke="#FFFFFF" stroke-opacity=".16" stroke-width="2"/>
    <circle cx="957" cy="279" r="137" fill="#FFFFFF" fill-opacity=".045" stroke="#D8BB70" stroke-opacity=".42" stroke-width="2"/>
    <image href="data:image/svg+xml;base64," x="866" y="178" width="182" height="201" preserveAspectRatio="xMidYMid meet"/>
    <text x="957" y="458" text-anchor="middle" fill="#F0D48A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="2.7">DECIDIR CON EVIDENCIA</text>
    <path d="M887 488H1027" stroke="#FFFFFF" stroke-opacity=".15"/>
    <text x="957" y="520" text-anchor="middle" fill="#B8C3E2" font-family="Arial, Helvetica, sans-serif" font-size="17">Command Center estratégico</text>
  </g>
