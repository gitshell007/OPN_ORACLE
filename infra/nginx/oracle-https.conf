# Final TLS server blocks.
# Install only after the certificate exists and external HTTPS validation passes.

server {
    listen 80;
    listen [::]:80;
    server_name oracle.opnconsultoria.com;
    server_tokens off;

    access_log /var/log/nginx/oracle-access.log oracle_safe;
    error_log /var/log/nginx/oracle-error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oracle.opnconsultoria.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/oracle.opnconsultoria.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oracle.opnconsultoria.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:OracleTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/oracle-access.log oracle_safe;
    error_log /var/log/nginx/oracle-error.log warn;

    client_max_body_size 26m;

    # Initial, deliberately short HSTS policy. Do not add includeSubDomains or
    # preload. Increase only after HTTPS and renewal have remained stable.
    add_header Strict-Transport-Security "max-age=86400" always;

    location ^~ /internal/ {
        return 404;
    }

    location = /internal {
        return 404;
    }

    location = /metrics {
        return 404;
    }

    location = /health/live {
        include /etc/nginx/snippets/oracle-api-proxy.conf;
    }

    location = /health/ready {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include /etc/nginx/snippets/oracle-api-proxy.conf;
    }

    location ^~ /api/v1/integrations/signal-avanza/webhooks/v1/ {
        error_log /var/log/nginx/oracle-webhook-error.log crit;
        client_max_body_size 1m;
        include /etc/nginx/snippets/oracle-api-proxy.conf;
    }

    location ^~ /api/ {
        include /etc/nginx/snippets/oracle-api-proxy.conf;
    }

    location / {
        include /etc/nginx/snippets/oracle-web-proxy.conf;
    }

    location @oracle_web_unavailable {
        add_header Cache-Control "no-store" always;
        if ($oracle_next_rsc_prefetch = 1) {
            return 204;
        }
        return 503;
    }
}
