# Install in /etc/nginx/conf.d/00-oracle-log-format.conf.
# This file is evaluated in Nginx's `http` context on Ubuntu.

# Accept a caller-provided request ID only when it is already safe for logs and
# headers. Otherwise use Nginx's own high-entropy request ID.
map $http_x_request_id $oracle_request_id {
    default $request_id;
    "~^[A-Za-z0-9][A-Za-z0-9._:-]{7,99}$" $http_x_request_id;
}

# `$uri` deliberately excludes the query string. The Signal subscription key
# lives in the URL path, so mask everything after the stable webhook prefix.
map $uri $oracle_safe_uri {
    default $uri;
    ~^/api/v1/integrations/signal-avanza/webhooks/v1/ /api/v1/integrations/signal-avanza/webhooks/v1/[redacted];
}

# Next.js RSC prefetches are opportunistic: if the web upstream is briefly
# unavailable during a container swap, the browser may surface noisy 503s even
# though the current page remains usable. Keep real navigations as 503, but let
# prefetches fail closed and be retried by the router after the new build is up.
map "$arg__rsc:$http_next_router_prefetch" $oracle_next_rsc_prefetch {
    default 0;
    "~^.+:1$" 1;
}

# Do not add `$request`, `$args`, `$request_uri`, `$http_referer`, cookies or
# authorization headers here: they can contain reset, invite or session data.
log_format oracle_safe escape=json
    '{'
      '"timestamp":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$oracle_safe_uri",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_time":"$upstream_response_time",'
      '"request_id":"$oracle_request_id",'
      '"host":"$host"'
    '}';
