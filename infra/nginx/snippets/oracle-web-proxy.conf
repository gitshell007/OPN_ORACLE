# Install in /etc/nginx/snippets/oracle-web-proxy.conf.
# Include only inside a location proxied to Next.js.

proxy_pass http://127.0.0.1:3000;
proxy_http_version 1.1;
proxy_set_header Connection "";

proxy_set_header Host $host;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Prefix "";
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Request-ID $oracle_request_id;
proxy_set_header X-Correlation-ID $oracle_request_id;

proxy_hide_header X-Powered-By;
proxy_hide_header Server;
proxy_connect_timeout 5s;
proxy_send_timeout 30s;
proxy_read_timeout 65s;

proxy_intercept_errors on;
error_page 502 503 504 = @oracle_web_unavailable;
