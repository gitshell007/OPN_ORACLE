# Bootstrap-only HTTP server block.
# Install temporarily as /etc/nginx/sites-available/oracle.conf, validate with
# `nginx -t`, then replace with oracle-https.conf after ACME succeeds.

server {
    listen 80;
    listen [::]:80;
    server_name oracle.opnconsultoria.com;
    server_tokens off;

    access_log /var/log/nginx/oracle-access.log oracle_safe;
    error_log /var/log/nginx/oracle-error.log warn;

    # 25 MiB application upload limit plus multipart overhead.
    client_max_body_size 26m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    # Liveness contains no dependency details and can support an external uptime check.
    location = /health/live {
        include /etc/nginx/snippets/oracle-api-proxy.conf;
    }

    # Bootstrap ACME nunca sirve login, API ni datos por HTTP. HTTPS sustituye
    # este site inmediatamente después de emitir y validar el certificado.
    location / {
        add_header Cache-Control "no-store" always;
        return 503;
    }
}
