name: Release candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable release version
        required: true
        type: string
      deploy_production:
        description: Request protected production deployment
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: api
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/opn-oracle-api:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
      - id: web
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/opn-oracle-web:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
      - name: Release manifest
        run: |
          mkdir -p release
          printf 'version=%s\ncommit=%s\napi_digest=%s\nweb_digest=%s\n' '${{ inputs.version }}' '${{ github.sha }}' '${{ steps.api.outputs.digest }}' '${{ steps.web.outputs.digest }}' > release/manifest.txt
          sha256sum release/manifest.txt > release/manifest.txt.sha256
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ inputs.version }}-${{ github.sha }}
          path: release/
          retention-days: 90

  production-gate:
    if: inputs.deploy_production
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Fail closed until protected deploy channel is configured
        run: |
          echo "Production activation requires the host-side backup, restore and offsite gates."
          echo "Use oracle-control.sh from the approved operator channel."
          exit 1
