name: Release candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: Immutable release version
        required: true
        type: string
      deploy_production:
        description: Request protected production deployment
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  validate-ci:
    name: Validate exact SHA CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: resolve
        name: Resolve release SHA
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"
      - name: Require successful CI for exact SHA
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repository = os.environ["GH_REPOSITORY"]
          target_sha = os.environ["TARGET_SHA"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }


          def get_json(path, params=None):
              query = f"?{urllib.parse.urlencode(params)}" if params else ""
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}{path}{query}",
                  headers=headers,
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))


          workflows = get_json("/actions/workflows", {"per_page": 100}).get("workflows", [])
          ci_workflow = next(
              (
                  workflow
                  for workflow in workflows
                  if workflow.get("path") == ".github/workflows/ci.yml"
                  or workflow.get("name") == "CI"
              ),
              None,
          )
          if not ci_workflow:
              print("No se encuentra el workflow CI requerido.", file=sys.stderr)
              sys.exit(1)

          runs = get_json(
              f"/actions/workflows/{ci_workflow['id']}/runs",
              {"head_sha": target_sha, "status": "completed", "per_page": 100},
          ).get("workflow_runs", [])
          successful = [
              run
              for run in runs
              if run.get("head_sha") == target_sha
              and run.get("status") == "completed"
              and run.get("conclusion") == "success"
          ]
          if not successful:
              print(
                  f"No se publica {target_sha}: CI no está verde para ese SHA exacto.",
                  file=sys.stderr,
              )
              print(
                  "Ejecuta primero el workflow CI para ese commit y espera conclusion=success.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"CI verde para {target_sha}: {successful[0].get('html_url')}")
          PY

  publish:
    needs: validate-ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.validate-ci.outputs.target_sha }}
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: api
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/opn-oracle-api:${{ needs.validate-ci.outputs.target_sha }}
          labels: |
            org.opencontainers.image.revision=${{ needs.validate-ci.outputs.target_sha }}
            org.opencontainers.image.version=${{ inputs.version }}
      - id: web
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/opn-oracle-web:${{ needs.validate-ci.outputs.target_sha }}
          labels: |
            org.opencontainers.image.revision=${{ needs.validate-ci.outputs.target_sha }}
            org.opencontainers.image.version=${{ inputs.version }}
      - name: Release manifest
        run: |
          mkdir -p release
          cat > release/manifest.txt <<'EOF'
          version=${{ inputs.version }}
          commit=${{ needs.validate-ci.outputs.target_sha }}
          api_digest=${{ steps.api.outputs.digest }}
          web_digest=${{ steps.web.outputs.digest }}
          EOF
          sha256sum release/manifest.txt > release/manifest.txt.sha256
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ inputs.version }}-${{ needs.validate-ci.outputs.target_sha }}
          path: release/
          retention-days: 90

  production-gate:
    if: inputs.deploy_production
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Fail closed until protected deploy channel is configured
        run: |
          echo "Production activation requires the host-side backup and restore gates."
          echo "Offsite receipt is optional unless ORACLE_REQUIRE_OFFSITE_RECEIPT=1 is enabled on the host."
          echo "Use oracle-control.sh from the approved operator channel."
          exit 1
